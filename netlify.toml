[build]
  command = "echo 'Build complete'"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/script.js"
  [headers.values]
    Content-Type = "application/javascript"
